<script type="text/babel">
function App() {
  return (
    <div>

      <div className="privacy-wrap">
        <h1>Politika privatnosti</h1>
        <div className="updated">Zadnja izmjena: travanj 2026.</div>

        <h2>Voditelj obrade</h2>
        <p>
          Adrinaut j.d.o.o., Sanja Vale Čupić<br />
          Kontakt: <a href="mailto:sanja@adrinaut.com">sanja@adrinaut.com</a>

        <h2>Koji podaci se prikupljaju</h2>
        <p>Podaci se prikupljaju isključivo putem obrasca za ponudu na stranici <a href="kontakt.html">kontakt.html</a>. Možete unijeti:</p>

        <p>Podaci se obrađuju isključivo radi izrade i dostave neobvezujuće ponude (čl. 6. st. 1. t. b) GDPR-a — obrada neophodna za izvršenje ugovora ili poduzimanje koraka na zahtjev ispitanika).</p>

        <p>Stranica ne koristi analitičke ni marketinške kolačiće. U <code>localStorage</code> preglednika pohranjuje se isključivo odabrani jezik sučelja (<code>takuin_lang</code>) radi boljeg korisničkog iskustva.</p>

        <h2>Vaša prava</h2>
        <p>Sukladno GDPR-u imate pravo pristupa, ispravka, brisanja i prijenosa svojih podataka, kao i pravo na prigovor i ograničenje obrade. Zahtjeve upućujte na <a href="mailto:sanja@adrinaut.com">sanja@adrinaut.com</a>. Imate i pravo podnošenja prigovora Agenciji za zaštitu osobnih podataka (AZOP).</p>
