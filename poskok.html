<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POSKOK — Desktop blagajna</title>
<link rel="stylesheet" href="styles/foundations.css">
<link rel="stylesheet" href="styles/site.css?v=2">
<link rel="stylesheet" href="styles/phone.css">
<style>
.desktop-mock { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-card); overflow: hidden; max-width: 560px; margin: 0 auto; }
.desktop-chrome { display: flex; align-items: center; gap: 6px; padding: 10px 14px; border-bottom: 1px solid rgba(0,0,0,0.06); background: var(--gray-50); }
.desktop-chrome span { width: 10px; height: 10px; border-radius: 9999px; background: #ccc; }
.desktop-body { padding: 16px; display: grid; grid-template-columns: 140px 1fr; gap: 12px; min-height: 360px; }
.desktop-side { display: flex; flex-direction: column; gap: 4px; }
.desktop-side .item { padding: 8px 10px; font-family: var(--font-body); font-size: 12px; color: var(--fg-3); border-radius: 6px; cursor: pointer; }
.desktop-side .item.on { background: var(--charcoal); color: #fff; font-weight: 600; }
.desktop-pane { animation: desktopFade 220ms ease both; }
@keyframes desktopFade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
.desktop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.desktop-tile { background: var(--gray-50); border-radius: 8px; padding: 14px 10px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; transition: background 180ms; }
.desktop-tile:hover { background: #eaeaea; }
.desktop-tile .n { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--fg-1); }
.desktop-tile .p { font-family: var(--font-display); font-size: 14px; color: var(--fg-1); letter-spacing: 0.2px; }
.desktop-total { margin-top: 12px; padding: 10px 12px; background: var(--charcoal); color: #fff; border-radius: 8px; display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 16px; }

.desktop-list { display: flex; flex-direction: column; gap: 4px; }
.desktop-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px; padding: 10px 12px; background: var(--gray-50); border-radius: 8px; }
.desktop-row .n { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--fg-1); }
.desktop-row .s { font-family: var(--font-body); font-size: 11px; color: var(--fg-3); }
.desktop-row .q { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); }
.desktop-badge { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: 0.4px; padding: 3px 7px; border-radius: 9999px; background: var(--charcoal); color: #fff; }
.desktop-badge.warn { background: #7A1E1E; }
.desktop-badge.muted { background: #b8b8b8; }

.desktop-avatar { width: 28px; height: 28px; border-radius: 9999px; background: var(--charcoal); color: #fff; font-family: var(--font-body); font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.desktop-row.staff { grid-template-columns: auto 1fr auto; }

.desktop-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.desktop-stat { background: var(--gray-50); border-radius: 8px; padding: 12px 10px; }
.desktop-stat .l { font-family: var(--font-body); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.5px; }
.desktop-stat .v { font-family: var(--font-display); font-size: 18px; color: var(--fg-1); margin-top: 2px; }
.desktop-bars { margin-top: 10px; background: var(--gray-50); border-radius: 8px; padding: 12px 10px; }
.desktop-bars .l { font-family: var(--font-body); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.desktop-bars .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; align-items: end; height: 70px; }
.desktop-bar { background: var(--charcoal); border-radius: 3px 3px 0 0; min-height: 6px; transition: opacity 180ms; }
.desktop-bars .x { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 4px; }
.desktop-bars .x span { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-align: center; }

.desktop-cat { margin-bottom: 8px; }
.desktop-cat .h { font-family: var(--font-body); font-size: 10px; font-weight: 600; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.6px; padding: 4px 2px 6px; }
.desktop-cat .body { display: flex; flex-direction: column; gap: 3px; }

.desktop-foot { margin-top: 12px; padding: 8px 12px; background: var(--gray-50); border-radius: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); display: flex; justify-content: space-between; gap: 10px; }

@media (max-width: 560px) {
  .desktop-mock { max-width: 100%; }
  .desktop-body { grid-template-columns: 1fr; gap: 10px; min-height: auto; padding: 12px; }
  .desktop-side { flex-direction: row; overflow-x: auto; gap: 6px; padding-bottom: 4px; }
  .desktop-side .item { white-space: nowrap; padding: 6px 10px; font-size: 11px; }
  .desktop-grid { grid-template-columns: repeat(3, 1fr); }
  .desktop-tile { padding: 12px 8px; }
  .desktop-chrome { padding: 8px 10px; }
  .desktop-row { padding: 8px 10px; gap: 8px; }
  .desktop-stat { padding: 10px 8px; }
  .desktop-stat .v { font-size: 15px; }
  .desktop-bars .row { height: 60px; }
  .desktop-foot { font-size: 10px; flex-direction: column; gap: 2px; }
}
</style>
</head>
<body>
<div id="root" data-screen-label="05 Poskok"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/i18n.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Pieces.jsx"></script>
<script type="text/babel">
const FAQ_HR = [
  { q: "Što je POSKOK?", a: "Moderna desktop blagajna za ugostiteljstvo i trgovinu — kasa koja radi na Windows računalu s ekranom osjetljivim na dodir ili mišem." },
  { q: "Tko koristi POSKOK?", a: "Restorani, kafići, trgovine, specijalizirane trgovine i ostala mjesta koja trebaju stabilan, provjeren desktop sustav." },
  { q: "Koja je razlika u odnosu na TAKUIN POS?", a: "TAKUIN POS je mobilna blagajna za Android uređaje. POSKOK je stacionarni sustav za pult — za ugostiteljstvo i trgovinu." },
  { q: "Da li je uključena fiskalizacija?", a: "Da. POSKOK podržava fiskalizaciju sukladno propisima RH." },
  { q: "Administracija i izvještaji?", a: "Kompletna administracija — skladište, cjenik, djelatnici, izvještaji prometa, PDV evidencija." },
  { q: "Koliko košta?", a: "Zatražite neobvezujuću ponudu. Instalacija je jednokratna, održavanje mjesečno." },
];

function PaneProdaja() {
  const items = [
    { n: "Espresso", p: "1,20" }, { n: "Cappuccino", p: "1,80" }, { n: "Macchiato", p: "1,50" },
    { n: "Čaj", p: "1,50" }, { n: "Kroasan", p: "1,80" }, { n: "Sok", p: "2,50" },
    { n: "Burek", p: "2,20" }, { n: "Sendvič", p: "3,50" }, { n: "Kolač", p: "2,80" },
  ];
  return (
    <div>
      <div className="desktop-grid">
        {items.map((it, i) => (
          <div key={i} className="desktop-tile">
            <span className="n">{it.n}</span>
            <span className="p">€{it.p}</span>
          </div>
        ))}
      </div>
      <div className="desktop-total"><span>Ukupno</span><span>€8,50</span></div>
    </div>
  );
}

function PaneSkladiste() {
  const stock = [
    { n: "Espresso zrno 1kg", q: "12 kom", ok: true },
    { n: "Mlijeko 1L", q: "3 kom", ok: false },
    { n: "Šećer 1kg", q: "8 kom", ok: true },
    { n: "Kroasan", q: "24 kom", ok: true },
    { n: "Burek", q: "6 kom", ok: false },
    { n: "Sok jabuka 0,2L", q: "18 kom", ok: true },
  ];
  return (
    <div>
      <div className="desktop-list">
        {stock.map((it, i) => (
          <div key={i} className="desktop-row">
            <span className="n">{it.n}</span>
            <span className="q">{it.q}</span>
            <span className={`desktop-badge ${it.ok ? "" : "warn"}`}>{it.ok ? "OK" : "NISKO"}</span>
          </div>
        ))}
      </div>
      <div className="desktop-foot"><span>Stavki ukupno: 124</span><span>Niskih zaliha: 2</span></div>
    </div>
  );
}

function PaneDjelatnici() {
  const staff = [
    { i: "AK", n: "Ana Kovač", r: "Šef smjene", s: "Prijavljena 07:00", on: true },
    { i: "MP", n: "Marko Perić", r: "Konobar", s: "Prijavljen 08:30", on: true },
    { i: "PM", n: "Petra Marić", r: "Konobarica", s: "Pauza", on: true, muted: true },
    { i: "IB", n: "Ivan Bošnjak", r: "Konobar", s: "Odjavljen", on: false },
  ];
  return (
    <div>
      <div className="desktop-list">
        {staff.map((p, i) => (
          <div key={i} className="desktop-row staff">
            <span className="desktop-avatar">{p.i}</span>
            <span>
              <div className="n">{p.n}</div>
              <div className="s">{p.r} · {p.s}</div>
            </span>
            <span className={`desktop-badge ${p.muted ? "muted" : (p.on ? "" : "warn")}`}>
              {p.muted ? "PAUZA" : (p.on ? "AKTIVAN" : "ODJAVA")}
            </span>
          </div>
        ))}
      </div>
      <div className="desktop-foot"><span>Smjena u tijeku</span><span>Promet smjene: €234,50</span></div>
    </div>
  );
}

function PaneIzvjestaji() {
  const days = [
    { d: "Pon", h: 42 }, { d: "Uto", h: 55 }, { d: "Sri", h: 38 },
    { d: "Čet", h: 70 }, { d: "Pet", h: 88 }, { d: "Sub", h: 95 }, { d: "Ned", h: 60 },
  ];
  return (
    <div>
      <div className="desktop-stats">
        <div className="desktop-stat"><div className="l">Promet danas</div><div className="v">€847,30</div></div>
        <div className="desktop-stat"><div className="l">Računa</div><div className="v">47</div></div>
        <div className="desktop-stat"><div className="l">Prosjek</div><div className="v">€18,02</div></div>
      </div>
      <div className="desktop-bars">
        <div className="l">Promet · zadnjih 7 dana</div>
        <div className="row">
          {days.map((d, i) => (
            <div key={i} className="desktop-bar" style={{ height: `${d.h}%`, opacity: 0.55 + (d.h / 200) }}></div>
          ))}
        </div>
        <div className="x">{days.map((d, i) => <span key={i}>{d.d}</span>)}</div>
      </div>
      <div className="desktop-foot"><span>Najprodavanije: Espresso (84)</span><span>Cappuccino (51)</span></div>
    </div>
  );
}

function PaneCjenik() {
  const cats = [
    { h: "Kava", body: [ ["Espresso", "1,20"], ["Macchiato", "1,50"], ["Cappuccino", "1,80"] ] },
    { h: "Pića",  body: [ ["Voda 0,25L", "1,50"], ["Čaj", "1,50"], ["Sok 0,2L", "2,50"] ] },
    { h: "Hrana", body: [ ["Burek", "2,20"], ["Kolač", "2,80"], ["Sendvič", "3,50"] ] },
  ];
  return (
    <div>
      {cats.map((c, i) => (
        <div key={i} className="desktop-cat">
          <div className="h">{c.h}</div>
          <div className="body">
            {c.body.map(([n, p], j) => (
              <div key={j} className="desktop-row">
                <span className="n">{n}</span>
                <span></span>
                <span className="q">€{p}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div className="desktop-foot"><span>PDV uključen · EUR</span><span>Ažurirano: danas</span></div>
    </div>
  );
}

function DesktopMock() {
  const [tab, setTab] = React.useState(0);
  const tabs = ["Prodaja", "Skladište", "Djelatnici", "Izvještaji", "Cjenik"];
  const panes = [PaneProdaja, PaneSkladiste, PaneDjelatnici, PaneIzvjestaji, PaneCjenik];
  const Pane = panes[tab];
  return (
    <div className="desktop-mock">
      <div className="desktop-chrome">
        <span></span><span></span><span></span>
        <div style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-3)' }}>POSKOK v4.2 · Kafić Jadran</div>
      </div>
      <div className="desktop-body">
        <div className="desktop-side">
          {tabs.map((lbl, i) => (
            <div key={i} className={`item ${i === tab ? "on" : ""}`} onClick={() => setTab(i)}>{lbl}</div>
          ))}
        </div>
        <div className="desktop-pane" key={tab}>
          <Pane/>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [, t] = useLang();
  return (
    <div>
      <Nav current="poskok"/>
      <div className="page">
        <div className="home-hero-grid" style={{ padding: '60px 0 40px' }}>
          <div className="home-hero-text">
            <div className="eyebrow"><span className="dot" style={{ background: '#7A1E1E', boxShadow: '0 0 0 3px rgba(122,30,30,0.15)' }}></span>{t.poskok.eyebrow}</div>
            <h1>{t.poskok.title}</h1>
            <p>{t.poskok.sub}</p>
            <div className="actions">
              <a href="kontakt.html?p=poskok" className="btn btn-primary">{t.poskok.ctaPrimary}</a>
              <a href="#pricing" className="btn btn-ghost">{t.poskok.ctaGhost}</a>
            </div>
            <HeroStats accent="#7A1E1E" items={[
              { value: 400, suffix: '+', label: 'korisnika', icon: 'users' },
              { value: 20, suffix: '+', label: 'godina na tržištu', icon: 'calendar' },
            ]} />
          </div>
          <DesktopMock/>
        </div>
      </div>

      <div className="page tk-section" id="pricing">
        <div className="section-head-lg">
          <div className="tk-eyebrow">Cjenik</div>
          <h2>Za ugostiteljstvo i trgovinu.</h2>
        </div>
        <div className="tk-pricing">
          <Price cat="" title="POSKOK Blagajna" amount="360" per="godišnje" features={[
            "Jednokratno plaćanje",
            "1 blagajna - 1 uređaj",
            "Skladište i cjenik",
            "Izvještaji prometa",
          ]} desc="Godišnja licenca za desktop blagajnu." cta="Zatraži ponudu"/>
          <Price cat="" title="POSKOK Blagajna" amount="50" per="mjesečno" featured features={[
            "Mjesečno plaćanje",
            "1 blagajna - 1 uređaj",
            "Skladište i cjenik",
            "Izvještaji prometa",
          ]} desc="Godišnja licenca za desktop blagajnu." cta="Zatraži ponudu"/>
           <Price cat="" title="Podešavanje sustava" amount="40" per="jednokratno" features={[
                "Instalacija i podešavanje",
                "U uredu ili putem telefona",
                "Edukacija korisnika",
              ]} desc="Kako bi bez stresa startali posao, sve vam podešavamo za rad."
                cta="Naruči" />
              <Price cat="" title="Prijenosni štampač" amount="120" per="jednokratno" features={[
                "Jamstvo 12 mjeseci",
                "Baterija 1500mAh, 7.4V",
                "Dimenzije 79×110×45mm",
                "Bluetooth povezivanje",
              ]} desc="Kupujete jednokratno. Povezuje se s aplikacijom za ispis računa, izvještaja i naloga."
                cta="Naruči" />
              <Price cat="" title="Telefonska podrška" amount="20" per="po intervenciji" features={[
                "20 EUR — 15 do 30 min",
                "40 EUR — 30 do 60 min",
                "Sve greške izvođača — besplatno",
              ]} desc="Podešavanje sustava, edukacija korisnika i rješavanje svih problema u radu."
                cta="Kontakt" />
        </div>
      </div>

      <div className="page tk-section">
        <div className="section-head-lg">
          <div className="tk-eyebrow">Zašto POSKOK?</div>
          <h2>Provjereno rješenje diljem Hrvatske.</h2>
        </div>
        <div className="tk-features-3">
          <Feature title="Stabilnost" items={[
            "20+ godina na tržištu",
            "400+ aktivnih korisnika",
            "Provjereno u dnevnom radu",
          ]}/>
          <Feature title="Kompletna administracija" items={[
            "Skladište i cjenik",
            "Djelatnici i smjene",
            "Izvještaji prometa",
            "PDV evidencija",
          ]}/>
          <Feature title="Podrška" items={[
            "Remote intervencije",
            "Telefonska podrška",
            "Redovna ažuriranja",
          ]}/>
        </div>
      </div>

      <div className="page tk-section-sm">
        <div className="section-head-lg"><h2>{t.faq.title}</h2></div>
        <Faq items={FAQ_HR}/>
      </div>

      <div className="page tk-section-sm">
        <CTA title={t.home.ctaTitle} sub={t.home.ctaSub} primary={t.home.ctaButton}/>
      </div>

      <Footer/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
