<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zatraži ponudu — TAKUIN</title>
<link rel="stylesheet" href="styles/foundations.css">
<link rel="stylesheet" href="styles/site.css">
<style>
.tk-form-wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 96px; }
.tk-form-hero { text-align: center; margin-bottom: 48px; }
.tk-form-hero h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(36px, 5vw, 52px); letter-spacing: -1.2px; line-height: 1.05; color: var(--fg-1); margin: 16px 0 14px; text-wrap: balance; }
.tk-form-hero p { font-family: var(--font-body); color: var(--fg-3); font-size: 17px; line-height: 1.55; max-width: 560px; margin: 0 auto; }

.tk-stepper { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 32px 0 8px; flex-wrap: wrap; }
.tk-step { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 9999px; font-family: var(--font-body); font-size: 12.5px; color: var(--fg-3); background: transparent; border: 1px solid transparent; }
.tk-step.on { background: var(--charcoal); color: #fff; }
.tk-step.done { color: var(--fg-2); }
.tk-step .num { width: 18px; height: 18px; border-radius: 9999px; background: rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; font-family: var(--font-mono); }
.tk-step.on .num { background: rgba(255,255,255,0.2); color: #fff; }
.tk-step.done .num { background: #e9efec; color: var(--accent-teal, #0A6C5F); }
.tk-step-sep { width: 16px; height: 1px; background: rgba(0,0,0,0.1); }

.tk-form-card {
  background: var(--white);
  border-radius: 18px;
  box-shadow: var(--shadow-card);
  padding: 48px;
  margin-top: 24px;
}
.tk-form-card h2 { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.4px; color: var(--fg-1); margin: 0 0 8px; }
.tk-form-card .sec-desc { font-family: var(--font-body); font-size: 14px; color: var(--fg-3); line-height: 1.5; margin: 0 0 28px; }

.tk-field { display: block; margin-bottom: 20px; }
.tk-field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
@media (max-width: 640px) { .tk-field-row { grid-template-columns: 1fr; } }

.tk-label { display: block; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--fg-2); margin-bottom: 6px; }
.tk-label .req { color: #B45454; margin-left: 2px; }
.tk-hint { font-family: var(--font-body); font-size: 12px; color: var(--fg-3); margin-top: 6px; line-height: 1.4; }

.tk-input, .tk-textarea, .tk-select {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid rgba(34,42,53,0.14);
  border-radius: 10px;
  background: var(--white);
  font-family: var(--font-body);
  font-size: 14.5px;
  color: var(--fg-1);
  transition: border-color 160ms, box-shadow 160ms;
  box-sizing: border-box;
}
.tk-input:focus, .tk-textarea:focus, .tk-select:focus {
  outline: none;
  border-color: var(--charcoal);
  box-shadow: 0 0 0 3px rgba(34,42,53,0.08);
}
.tk-textarea { resize: vertical; min-height: 96px; font-family: var(--font-body); line-height: 1.5; }

.tk-radio-group, .tk-check-group { display: flex; flex-direction: column; gap: 8px; }
.tk-radio-group.inline { flex-direction: row; flex-wrap: wrap; gap: 10px; }
.tk-option {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border: 1px solid rgba(34,42,53,0.14);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 160ms, background 160ms;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--fg-2);
  user-select: none;
}
.tk-option:hover { border-color: rgba(34,42,53,0.28); background: var(--gray-50); }
.tk-option.on { border-color: var(--charcoal); background: #f7f7f7; color: var(--fg-1); }
.tk-option input { margin: 0; accent-color: var(--charcoal); }

.tk-form-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 40px; padding-top: 28px;
  border-top: 1px solid rgba(34,42,53,0.08);
  gap: 12px;
}
.tk-form-foot .ghost { background: transparent; border: 1px solid rgba(34,42,53,0.14); color: var(--fg-2); }
.tk-form-foot .ghost:hover { background: var(--gray-50); }

.tk-success {
  text-align: center; padding: 64px 32px;
}
.tk-success .check {
  width: 64px; height: 64px; border-radius: 9999px;
  background: #0A6C5F; color: #fff;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
}

@media (max-width: 560px) {
  .tk-form-wrap { padding: 32px 16px 64px; }
  .tk-form-card { padding: 28px 20px; border-radius: 14px; }
  .tk-form-hero { margin-bottom: 32px; }
  .tk-input, .tk-textarea, .tk-select { font-size: 16px; min-height: 44px; padding: 12px 14px; }
  .tk-option { padding: 14px; font-size: 15px; }
  .tk-form-foot { flex-direction: column-reverse; align-items: stretch; gap: 10px; margin-top: 28px; padding-top: 20px; }
  .tk-form-foot button { width: 100%; justify-content: center; }
  .tk-stepper { gap: 2px; margin: 20px 0 4px; }
  .tk-step { padding: 6px 10px; font-size: 11.5px; }
  .tk-step-sep { width: 10px; }
  .tk-success { padding: 40px 16px; }
}
</style>
</head>
<body>
<div id="root" data-screen-label="07 Kontakt"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/i18n.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Pieces.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Field({ label, req, hint, children }) {
  return (
    <label className="tk-field">
      <span className="tk-label">{label}{req && <span className="req">*</span>}</span>
      {children}
      {hint && <div className="tk-hint">{hint}</div>}
    </label>
  );
}

function Option({ checked, onClick, children, type = "checkbox" }) {
  return (
    <label className={`tk-option ${checked ? 'on' : ''}`} onClick={e => { e.preventDefault(); onClick(e); }}>
      <input type={type} checked={checked} onChange={() => {}}/>
      <span>{children}</span>
    </label>
  );
}

const STEPS = [
  { id: 'company', label: 'Tvrtka' },
  { id: 'offer',   label: 'Ponuda' },
  { id: 'period',  label: 'Period rada' },
];

const PRODUCTS = [
  { id: 'pos',     label: 'TAKUIN POS — mobilna fiskalna blagajna' },
  { id: 'rent',    label: 'TAKUIN RENT MANAGER (blagajna + PARK + Nadglednik)' },
  { id: 'port',    label: 'TAKUIN PORT — sustav za luke/sidrišta' },
  { id: 'poskok',  label: 'POSKOK — desktop blagajna' },
  { id: 'printer', label: 'Bluetooth štampač (jamstvo 12 mj.)' },
  { id: 'tabletLTE', label: 'Tablet LTE (za rad bez WiFi-a)' },
  { id: 'tabletWF',  label: 'Tablet bez SIM — WiFi only' },
];

const PERIODS = [
  '5., 6., 7., 8. i 9. mjesec (cijela sezona)',
  '6., 7., 8. i 9. mjesec',
  'Tri mjeseca',
  'Dva mjeseca',
  'Jedan mjesec',
  '6+ mjeseci / cijela godina',
];

function useQueryProduct() {
  const [pre] = useState(() => {
    try {
      const p = new URLSearchParams(window.location.search).get('p');
      return p && PRODUCTS.find(x => x.id === p) ? p : null;
    } catch (e) { return null; }
  });
  return pre;
}

function App() {
  const [, t] = useLang();
  const pre = useQueryProduct();
  const [step, setStep] = useState(0);
  const [sent, setSent] = useState(false);
  const [f, setF] = useState({
    company: '', owner: '', phone: '', email: '', emailInvoice: '',
    address: '', oib: '', pdv: '',
    products: pre ? [pre] : [],
    period: '', extras: '', note: '',
  });
  const up = (k, v) => setF(s => ({ ...s, [k]: v }));
  const toggle = (k, v) => setF(s => ({ ...s, [k]: s[k].includes(v) ? s[k].filter(x => x !== v) : [...s[k], v] }));

  const next = () => setStep(s => Math.min(s + 1, STEPS.length - 1));
  const prev = () => setStep(s => Math.max(s - 1, 0));
  const submit = () => {
    const line = (label, val) => val ? `${label}: ${val}` : null;
    const productLabels = f.products
      .map(id => (PRODUCTS.find(p => p.id === id) || {}).label)
      .filter(Boolean);
    const parts = [
      '— PODACI O TVRTKI —',
      line('Tvrtka / obrt', f.company),
      line('Vlasnik', f.owner),
      line('Telefon', f.phone),
      line('E-mail (kontakt)', f.email),
      line('E-mail (ponuda/račun)', f.emailInvoice),
      line('Adresa', f.address),
      line('OIB', f.oib),
      line('PDV', f.pdv),
      '',
      '— PONUDA —',
      productLabels.length ? `Proizvodi:\n- ${productLabels.join('\n- ')}` : null,
      line('Dodatno', f.extras),
      '',
      '— PERIOD —',
      line('Period rada', f.period),
      line('Napomena', f.note),
    ].filter(x => x !== null && x !== undefined);
    const body = parts.join('\n');
    const subject = `Upit za ponudu — ${f.company || 'Takuin'}`;
    const href = `mailto:sanja@adrinaut.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = href;
    setSent(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (sent) {
    return (
      <div>
        <Nav current="kontakt"/>
        <div className="tk-form-wrap">
          <div className="tk-form-card tk-success">
            <div className="check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <h2 style={{ fontSize: 30, letterSpacing: -0.8, marginBottom: 12 }}>Vaš e-mail klijent otvoren!</h2>
            <p style={{ color: 'var(--fg-3)', fontSize: 16, maxWidth: 480, margin: '0 auto 16px' }}>
              Pripremili smo poruku u vašem e-mail klijentu — samo je pošaljite. Ako se klijent nije otvorio, pišite nam izravno:
            </p>
            <a href="mailto:sanja@adrinaut.com" style={{ display: 'inline-block', marginBottom: 28, color: 'var(--fg-1)', fontWeight: 600, fontSize: 15 }}>sanja@adrinaut.com</a>
            <br />
            <a href="index.html" className="btn btn-primary">Povratak na naslovnu</a>
          </div>
        </div>
        <Footer/>
      </div>
    );
  }

  return (
    <div>
      <Nav current="kontakt"/>
      <div className="tk-form-wrap">
        <div className="tk-form-hero">
          <div className="eyebrow" style={{ justifyContent: 'center' }}><span className="dot" style={{ background: '#0A6C5F', boxShadow: '0 0 0 3px rgba(10,108,95,0.15)' }}></span>Obrazac za ponudu</div>
          <h1>Zatraži neobvezujuću ponudu.</h1>
          <p>Ispunite obrazac u nastavku — odgovorit ćemo u najkraćem roku s detaljnom ponudom i uputama za podešavanje sustava.</p>
        </div>

        <div className="tk-stepper">
          {STEPS.map((s, i) => (
            <React.Fragment key={s.id}>
              <div className={`tk-step ${step === i ? 'on' : (step > i ? 'done' : '')}`}>
                <span className="num">{step > i ? '✓' : i + 1}</span>
                <span>{s.label}</span>
              </div>
              {i < STEPS.length - 1 && <div className="tk-step-sep"/>}
            </React.Fragment>
          ))}
        </div>

        <div className="tk-form-card">
          {step === 0 && (
            <div>
              <h2>Podaci o tvrtki / obrtu</h2>
              <div className="sec-desc">Samo kontakt podaci — sve ostalo (FINA certifikat, cjenik, djelatnici) prikupljamo u sljedećem koraku nakon izrade ponude.</div>
              <div className="tk-field-row">
                <Field label="Naziv tvrtke / obrta" req><input className="tk-input" value={f.company} onChange={e => up('company', e.target.value)}/></Field>
                <Field label="Ime vlasnika" req><input className="tk-input" value={f.owner} onChange={e => up('owner', e.target.value)}/></Field>
              </div>
              <div className="tk-field-row">
                <Field label="Kontakt telefon" req><input className="tk-input" type="tel" value={f.phone} onChange={e => up('phone', e.target.value)}/></Field>
                <Field label="Kontakt e-mail" req><input className="tk-input" type="email" value={f.email} onChange={e => up('email', e.target.value)}/></Field>
              </div>
              <Field label="E-mail za slanje ponude / računa" hint="Ako se razlikuje od gornjeg e-maila — npr. e-mail knjigovođe">
                <input className="tk-input" type="email" value={f.emailInvoice} onChange={e => up('emailInvoice', e.target.value)}/>
              </Field>
              <Field label="Adresa tvrtke / obrta"><input className="tk-input" value={f.address} onChange={e => up('address', e.target.value)}/></Field>
              <div className="tk-field-row">
                <Field label="OIB tvrtke / obrta"><input className="tk-input" value={f.oib} onChange={e => up('oib', e.target.value)}/></Field>
                <Field label="U sustavu PDV-a?">
                  <div className="tk-radio-group inline">
                    <Option type="radio" checked={f.pdv === 'DA'} onClick={() => up('pdv', 'DA')}>DA</Option>
                    <Option type="radio" checked={f.pdv === 'NE'} onClick={() => up('pdv', 'NE')}>NE</Option>
                  </div>
                </Field>
              </div>
            </div>
          )}

          {step === 1 && (
            <div>
              <h2>Molim neobvezujuću ponudu za</h2>
              <div className="sec-desc">Odaberite sve stavke koje vas zanimaju. Možete odabrati više.</div>
              <div className="tk-check-group">
                {PRODUCTS.map(p => (
                  <Option key={p.id} checked={f.products.includes(p.id)} onClick={() => toggle('products', p.id)}>
                    {p.label}
                  </Option>
                ))}
              </div>
              <div style={{ marginTop: 24 }}>
                <Field label="Dodatno u ponudu" hint="Npr. trebam više blagajni, više sustava, dodatni Nadglednik za partnera / suvlasnika / knjigovođu…">
                  <textarea className="tk-textarea" rows={3} value={f.extras} onChange={e => up('extras', e.target.value)}/>
                </Field>
              </div>
            </div>
          )}

          {step === 2 && (
            <div>
              <h2>Period rada</h2>
              <div className="sec-desc">Odaberite očekivani period korištenja sustava. Plaćate mjesečno održavanje samo za mjesece u kojima radite.</div>
              <div className="tk-radio-group">
                {PERIODS.map(p => (
                  <Option key={p} type="radio" checked={f.period === p} onClick={() => up('period', p)}>{p}</Option>
                ))}
              </div>
              <div style={{ marginTop: 24 }}>
                <Field label="Dodatna napomena">
                  <textarea className="tk-textarea" rows={3} value={f.note} onChange={e => up('note', e.target.value)} placeholder="Sve što smatrate važnim da znamo…"/>
                </Field>
              </div>
            </div>
          )}

          <div className="tk-form-foot">
            <div>
              {step > 0 && <button className="btn ghost" onClick={prev}>← Natrag</button>}
            </div>
            <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--fg-3)' }}>Korak {step + 1} od {STEPS.length}</div>
            <div>
              {step < STEPS.length - 1
                ? <button className="btn btn-primary" onClick={next}>Dalje →</button>
                : <button className="btn btn-primary" onClick={submit}>Pošalji upit</button>}
            </div>
          </div>
        </div>

        <div style={{ marginTop: 24, padding: '16px 20px', background: 'var(--gray-50)', borderRadius: 12, fontFamily: 'var(--font-body)', fontSize: 13, color: 'var(--fg-3)', textAlign: 'center' }}>
          Ili nas kontaktirajte izravno na <a href="mailto:sanja@adrinaut.com" style={{ color: 'var(--fg-1)' }}>sanja@adrinaut.com</a>
        </div>
      </div>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
